# AI Text Detector — Katee Application
#
# Deploys two components:
#   ai-text-detector-api   — FastAPI inference service (snstateless, PVC-mounted artifacts)
#   ai-text-detector-web   — Next.js frontend          (snstateless)
#
# Prerequisites:
#   - The artifact PVC "ai-text-detector-artifacts" must already exist in the namespace.
#   - Images must be built and pushed to the GCR registry before applying.
#
# Build and push images:
#   docker build -t <your-registry>/<your-project>/<your-team>/ai-text-detector-api:latest \
#     -f services/api/Dockerfile .
#   docker build -t <your-registry>/<your-project>/<your-team>/ai-text-detector-web:latest \
#     --build-arg API_INTERNAL_BASE_URL=http://ai-text-detector-api:8000 \
#     apps/web/
#   docker push <your-registry>/<your-project>/<your-team>/ai-text-detector-api:latest
#   docker push <your-registry>/<your-project>/<your-team>/ai-text-detector-web:latest
#
# Apply:
#   kubectl apply -f infra/k8s/app/katee-application.yaml
#
# Verify:
#   kubectl get application ai-text-detector -n <your-namespace>
#   kubectl get pods -n <your-namespace> -l app=ai-text-detector-api
#   kubectl get pods -n <your-namespace> -l app=ai-text-detector-web

apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: ai-text-detector
  namespace: <your-namespace>
  labels:
    app.kubernetes.io/name: ai-text-detector
    app.kubernetes.io/part-of: ai-text-detector
    team: <your-team>

spec:
  components:

    # -----------------------------------------------------------------------
    # API service — FastAPI + ML inference
    # CPU-only inference; requires ~4–6 GB RAM for torch + model weights.
    # snstateful because the artifact PVC is ReadWriteOnce (single-node).
    # -----------------------------------------------------------------------
    - name: ai-text-detector-api
      type: snstateful
      properties:
        image: <your-registry>/<your-project>/<your-team>/ai-text-detector-api:1.0
        ports:
          - containerPort: 8000
            name: api
            protocol: http
            servicePort: 8000
        computeClassEnabled: true
        computeClass: cost-optimized
        resources:
          cpu: 2
          memory: 6Gi
        env:
          - name: API_ENV
            value: production
          - name: API_ENABLE_ARTIFACT_MODELS
            value: "true"
          - name: API_ML_ARTIFACT_DIR
            # Path must match the mountPath in the snpvc trait below.
            value: /mnt/artifacts/modernbert-en-v1-rerun-20260310
          - name: API_ARTIFACT_DEVICE
            value: cpu
          - name: API_FRONTEND_ORIGIN
            # Replace with the actual external hostname served by the web ingress.
            value: https://<your-app-hostname>.apps.<your-cluster>.springernature.io
          - name: API_MAX_UPLOAD_SIZE_MB
            value: "20"
      traits:
        - type: snstorage
          properties:
            pvc:
              - name: ai-text-detector-artifacts
                mountPath: /mnt/artifacts
                mountOnly: true

    # -----------------------------------------------------------------------
    # Web frontend — Next.js (standalone output)
    # Proxies browser requests to the API via /api-proxy/* rewrites so no
    # external API URL needs to be baked into the image at build time.
    # -----------------------------------------------------------------------
    - name: ai-text-detector-web
      type: snstateless
      properties:
        image: <your-registry>/<your-project>/<your-team>/ai-text-detector-web:1.0
        ports:
          - containerPort: 3000
            name: web
            protocol: http
            servicePort: 3000
        computeClassEnabled: true
        computeClass: cost-optimized
        resources:
          cpu: 1
          memory: 512Mi
        env:
          - name: NODE_ENV
            value: production
          - name: API_INTERNAL_BASE_URL
            # Internal k8s service DNS name for the API component.
            # Katee creates a ClusterIP Service with the component name.
            value: http://ai-text-detector-api:8000
      traits:
        - type: sningress
          properties:
            privateRoutes:
              - route: <your-app-hostname>.apps.<your-cluster>.springernature.io
                servicePort: 3000
