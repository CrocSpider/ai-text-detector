apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: ai-text-detector-prepare-hc3
  namespace: <your-namespace>
  labels:
    team: <your-team>
    environment: prod
  annotations:
    katee.springernature.io/email: <owner-email>
    katee.springernature.io/vault: <your-team>
spec:
  components:
    - name: ai-text-detector-prepare-hc3
      type: snjob
      properties:
        image: <your-registry>/<your-project>/<your-team>/ai-text-detector-trainer:1.4
        imagePullPolicy: IfNotPresent
        restartPolicy: Never
        backoffLimit: 0
        cleanupFinishedJobTTLSeconds: 604800
        cleanupPreviousJobs: true
        terminationGracePeriodSeconds: 30
        holdApplicationUntilProxyStarts: false
        command:
          - python
          - -m
          - trainer.cli
          - prepare-hc3
          - --output-dir
          - /mnt/data
          - --subset
          - all
          - --max-per-class
          - "12000"
        resources:
          cpu: "1"
          memory: 8Gi
        env:
          - name: HF_HOME
            value: /cache/huggingface
          - name: TRANSFORMERS_CACHE
            value: /cache/huggingface
          - name: TOKENIZERS_PARALLELISM
            value: "false"
      traits:
        - type: snstorage
          properties:
            pvc:
              - name: ai-text-detector-data
                mountPath: /mnt/data
                accessModes:
                  - ReadWriteOnce
                storageClassName: csi-regional-standard
                resources:
                  requests:
                    storage: 200Gi
            emptyDir:
              - name: cache
                mountPath: /cache
