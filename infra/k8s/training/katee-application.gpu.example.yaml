apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: ai-text-detector-train
  namespace: YOUR-NAMESPACE
  labels:
    team: YOUR-TEAM
    environment: prod
  annotations:
    katee.springernature.io/email: ibrahim.alhatti@springernature.com
    katee.springernature.io/vault: we-asia
spec:
  components:
    - name: ai-text-detector-train
      type: snjob
      properties:
        image: REGISTRY/PROJECT/TEAM/ai-text-detector-trainer:1.3
        imagePullPolicy: IfNotPresent
        restartPolicy: Never
        backoffLimit: 0
        cleanupFinishedJobTTLSeconds: 604800
        cleanupPreviousJobs: true
        terminationGracePeriodSeconds: 30
        holdApplicationUntilProxyStarts: false
        command:
          - python
          - -m
          - trainer.cli
          - train
          - --config
          - /config/train.yaml
        resources:
          cpu: "4"
          memory: 24Gi
        env:
          - name: HF_HOME
            value: /cache/huggingface
          - name: TRANSFORMERS_CACHE
            value: /cache/huggingface
          - name: TOKENIZERS_PARALLELISM
            value: "false"
        gpuSupport: true
        gpuType: nvidia-tesla-t4
        gpuNumber: 1
        computeClassEnabled: true
        computeClass: nvidia-tesla-t4-1
      traits:
        - type: snstorage
          properties:
            configMap:
              - name: ai-text-detector-training-config
                mountPath: /config
                data:
                  train.yaml: |
                    run:
                      output_dir: /mnt/artifacts/modernbert-en-v1
                      experiment_name: ai-text-origin-risk
                      run_name: modernbert-en-v1
                      seed: 42
                    dataset:
                      train_sources:
                        - /mnt/data/train.jsonl
                      validation_sources:
                        - /mnt/data/validation.jsonl
                      test_sources:
                        - /mnt/data/test.jsonl
                      text_key: text
                      label_key: label
                      document_id_key: document_id
                      language_key: language
                      domain_key: domain
                      writer_profile_key: writer_profile
                      attack_type_key: attack_type
                      source_dataset_key: source_dataset
                      extraction_quality_key: extraction_quality
                      min_text_chars: 80
                      target_chunk_chars: 900
                      max_chunk_chars: 1500
                      slice_keys:
                        - language
                        - domain
                        - writer_profile
                        - attack_type
                        - source_dataset
                        - text_length_bucket
                    model:
                      base_model_name: answerdotai/ModernBERT-base
                      max_length: 512
                      epochs: 2
                      train_batch_size: 8
                      eval_batch_size: 16
                      learning_rate: 0.00002
                      weight_decay: 0.01
                      warmup_ratio: 0.1
                      gradient_accumulation_steps: 2
                      fp16: true
                      bf16: false
                      logging_steps: 25
                      save_total_limit: 2
                    stylometry:
                      enabled: true
                      n_estimators: 300
                      learning_rate: 0.05
                      num_leaves: 31
                    meta:
                      enabled: true
                      target_max_false_positive_rate: 0.05
                    evaluation:
                      positive_threshold: 0.5
                      min_slice_examples: 20
            pvc:
              - name: ai-text-detector-data
                mountPath: /mnt/data
                accessModes:
                  - ReadWriteOnce
                storageClassName: csi-regional-standard
                resources:
                  requests:
                    storage: 200Gi
              - name: ai-text-detector-artifacts
                mountPath: /mnt/artifacts
                accessModes:
                  - ReadWriteOnce
                storageClassName: csi-regional-standard
                resources:
                  requests:
                    storage: 100Gi
              - name: ai-text-detector-cache
                mountPath: /cache
                accessModes:
                  - ReadWriteOnce
                storageClassName: csi-regional-standard
                resources:
                  requests:
                    storage: 50Gi
