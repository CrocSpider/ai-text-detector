version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      API_FRONTEND_ORIGIN: http://localhost:3000
      API_ENV: development
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        API_INTERNAL_BASE_URL: http://api:8000
    environment:
      # Used by Next.js rewrites() at runtime to forward /api-proxy/* requests.
      # The browser never needs to know the API host directly.
      API_INTERNAL_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
