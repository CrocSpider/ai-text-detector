version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      API_FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      API_INTERNAL_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
